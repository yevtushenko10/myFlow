<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565c8"/>
      <stop offset="55%" style="stop-color:#1899d6"/>
      <stop offset="100%" style="stop-color:#26c9a0"/>
    </linearGradient>
    <linearGradient id="ribbon1" x1="0%" y1="0%" x2="100%" y2="80%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#80eee8"/>
    </linearGradient>
    <linearGradient id="ribbon2" x1="0%" y1="0%" x2="100%" y2="80%">
      <stop offset="0%" style="stop-color:#b0f4ef"/>
      <stop offset="100%" style="stop-color:#38d8c8"/>
    </linearGradient>
    <linearGradient id="ribbon3" x1="0%" y1="0%" x2="100%" y2="80%">
      <stop offset="0%" style="stop-color:#d0f8f4"/>
      <stop offset="100%" style="stop-color:#50ddd0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="105" ry="105" fill="url(#bg)"/>

  <!-- Highlight overlay top-left -->
  <radialGradient id="hl" cx="30%" cy="25%" r="55%">
    <stop offset="0%" style="stop-color:rgba(255,255,255,0.18)"/>
    <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
  </radialGradient>
  <rect width="512" height="512" rx="105" ry="105" fill="url(#hl)"/>

  <!--
    Three flowing ribbon strokes forming the "F":
    - Ribbon 1 (top): long, sweeps right
    - Ribbon 2 (middle): medium, sweeps right
    - Ribbon 3 (stem): vertical, connects them on left
  -->

  <!-- Top ribbon — curves gently upward to the right -->
  <path d="
    M 130 152
    C 200 128, 330 130, 390 155
    C 395 168, 390 185, 382 192
    C 320 170, 195 168, 130 190
    C 118 178, 118 164, 130 152
    Z"
    fill="url(#ribbon1)" opacity="0.96"/>

  <!-- Middle ribbon — slightly shorter, curves right -->
  <path d="
    M 130 246
    C 195 224, 300 226, 348 248
    C 353 261, 348 278, 340 284
    C 290 264, 190 262, 130 282
    C 118 270, 118 258, 130 246
    Z"
    fill="url(#ribbon2)" opacity="0.96"/>

  <!-- Vertical stem ribbon — goes from top ribbon down to bottom -->
  <path d="
    M 130 152
    C 148 148, 165 150, 172 162
    L 172 372
    C 172 386, 160 394, 146 392
    C 132 390, 122 380, 122 366
    L 122 164
    C 122 154, 126 152, 130 152
    Z"
    fill="url(#ribbon1)" opacity="0.96"/>
</svg>
